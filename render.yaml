# Static Site (Vite): build desde la raíz del repo — no hace falta "Root Directory = frontend".
# En el Dashboard, si configuras a mano: Build = npm run build, Publish = frontend/dist
services:
  - type: web
    name: sgf-frontend
    runtime: static
    buildCommand: npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: header
        source: /*
        name: X-Content-Type-Options
        value: nosniff
      - type: header
        source: /*
        name: X-Frame-Options
        value: DENY
      - type: header
        source: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - type: header
        source: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://gestion-de-facturas-gfac.onrender.com/api
