services:
  db:
    image: postgres:17-alpine
    container_name: sgf_db
    environment:
      POSTGRES_USER: sgfuser
      POSTGRES_PASSWORD: sgfpass
      POSTGRES_DB: sgf_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgfuser -d sgf_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://sgfuser:sgfpass@db:5432/sgf_db
      SECRET_KEY: dev-secret-key-change-in-production
      ALGORITHM: HS256
      CORS_ORIGINS: "*"
      APP_ENV: development
      ALLOW_INSECURE_DEFAULTS: "true"
      ENABLE_OPENAPI: "true"
      ENABLE_MOCK_CHECKOUT: "true"
      SEED_DEMO_DATA: "true"
      AUTO_MIGRATE_ON_STARTUP: "true"
      TRUSTED_HOSTS: "*"
      # Opcional: extracción estructurada desde PDF/imagen (definir GEMINI_API_KEY en .env o entorno)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    # Si la BD ya tenía tablas creadas antes de Alembic: `docker compose run --rm api alembic stamp f72dc0a687f8` una vez.
    command: >
      sh -c "alembic upgrade head &&
      uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    container_name: sgf_frontend
    ports:
      - "5173:8080"
    depends_on:
      - api

volumes:
  postgres_data: